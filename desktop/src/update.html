<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';" />
  <title>Starlab Code</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Pretendard", "Apple SD Gothic Neo", sans-serif;
      background: linear-gradient(180deg, #eef2fb 0%, #f4f6fa 100%);
      color: #1f2937;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
    }
    .panel {
      width: min(520px, calc(100vw - 80px));
      padding: 56px 56px 48px;
      text-align: center;
    }
    .brand {
      width: 56px; height: 56px;
      margin: 0 auto 28px;
      border-radius: 16px;
      background: #0b5fff;
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; font-weight: 800;
      letter-spacing: -0.6px;
      box-shadow: 0 14px 30px rgba(11, 95, 255, 0.28);
    }
    .brand img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      padding: 7px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 10px;
      letter-spacing: -0.3px;
    }
    .subtitle {
      font-size: 13.5px;
      color: #475569;
      line-height: 1.6;
      margin-bottom: 32px;
      min-height: 22px;
    }
    .progress {
      position: relative;
      width: 100%;
      height: 6px;
      background: #dbe3f1;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #0b5fff, #4d8aff);
      border-radius: 999px;
      transition: width 200ms ease-out;
    }
    .progress-fill.indeterminate {
      position: absolute;
      top: 0;
      left: -40%;
      width: 40% !important;
      transition: none;
      animation: slide 1.4s ease-in-out infinite;
    }
    @keyframes slide {
      0% { left: -40%; }
      100% { left: 100%; }
    }
    .progress-text {
      font-size: 12px;
      color: #64748b;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.2px;
      min-height: 18px;
    }
    .install-row {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 13.5px;
      color: #0b5fff;
      margin-top: 6px;
    }
    .install-row.is-visible { display: flex; }
    .spinner {
      width: 18px; height: 18px;
      border-radius: 50%;
      border: 2px solid #c7d6f7;
      border-top-color: #0b5fff;
      animation: spin 800ms linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error {
      display: none;
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #b91c1c;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.5;
      margin-top: 22px;
      text-align: left;
    }
    .error.is-visible { display: block; }
    .retry {
      display: none;
      margin-top: 16px;
      background: #0b5fff;
      color: #fff;
      border: none;
      padding: 10px 22px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      -webkit-app-region: no-drag;
    }
    .retry.is-visible { display: inline-block; }
    .retry:hover { background: #093fb0; }
    .meta {
      font-size: 11px;
      color: #94a3b8;
      margin-top: 26px;
      letter-spacing: 0.4px;
      min-height: 14px;
    }
  </style>
</head>
<body>
  <main class="panel" role="status" aria-live="polite">
    <div class="brand" aria-hidden="true">
      <!-- Desktop update screen logo PNG URL: replace desktop/assets/logo.png with your own PNG. -->
      <img src="../assets/logo.png" alt="" />
    </div>
    <h1 id="title">Starlab Code 시작 중</h1>
    <p class="subtitle" id="subtitle">잠시만 기다려 주세요.</p>

    <div class="progress" id="progress-track">
      <div class="progress-fill indeterminate" id="progress-fill"></div>
    </div>
    <div class="progress-text" id="progress-text"></div>
    <div class="install-row" id="install-row">
      <div class="spinner" aria-hidden="true"></div>
      <span id="install-text">설치 중입니다.</span>
    </div>

    <div class="error" id="error" role="alert"></div>
    <button type="button" class="retry" id="retry">다시 시도</button>

    <div class="meta" id="meta"></div>
  </main>

  <script>
    (function () {
      var refs = {
        title: document.getElementById('title'),
        subtitle: document.getElementById('subtitle'),
        track: document.getElementById('progress-track'),
        fill: document.getElementById('progress-fill'),
        text: document.getElementById('progress-text'),
        installRow: document.getElementById('install-row'),
        installText: document.getElementById('install-text'),
        error: document.getElementById('error'),
        retry: document.getElementById('retry'),
        meta: document.getElementById('meta'),
      };

      function formatBytes(bytes) {
        if (!bytes || bytes <= 0) return '';
        var units = ['B', 'KB', 'MB', 'GB'];
        var unit = 0;
        var value = bytes;
        while (value >= 1024 && unit < units.length - 1) {
          value /= 1024;
          unit += 1;
        }
        var fixed = value >= 100 ? 0 : value >= 10 ? 1 : 2;
        return value.toFixed(fixed) + ' ' + units[unit];
      }

      function setIndeterminate(on) {
        if (on) {
          refs.fill.classList.add('indeterminate');
          refs.fill.style.width = '';
        } else {
          refs.fill.classList.remove('indeterminate');
        }
      }

      function showInstall(visible) {
        if (visible) refs.installRow.classList.add('is-visible');
        else refs.installRow.classList.remove('is-visible');
      }

      function showError(visible) {
        if (visible) refs.error.classList.add('is-visible');
        else refs.error.classList.remove('is-visible');
      }

      function showRetry(visible) {
        if (visible) refs.retry.classList.add('is-visible');
        else refs.retry.classList.remove('is-visible');
      }

      function render(state) {
        if (!state) return;
        var status = state.status || 'checking';
        var manifest = state.manifest || {};

        showError(false);
        showRetry(false);
        showInstall(false);
        refs.track.style.display = '';

        if (status === 'checking') {
          refs.title.textContent = 'Starlab Code 시작 중';
          refs.subtitle.textContent = '업데이트를 확인하고 있습니다.';
          setIndeterminate(true);
          refs.text.textContent = '';
          refs.meta.textContent = 'v' + (state.currentVersion || '');
          return;
        }

        if (status === 'downloading') {
          refs.title.textContent = '업데이트 다운로드 중';
          refs.subtitle.textContent = manifest.latest_version
            ? '버전 ' + manifest.latest_version + ' 을(를) 받고 있습니다.'
            : '새 버전을 받고 있습니다.';
          var total = (state.progress && state.progress.total) || 0;
          var downloaded = (state.progress && state.progress.downloaded) || 0;
          if (total > 0) {
            var pct = Math.min(100, Math.round((downloaded / total) * 100));
            setIndeterminate(false);
            refs.fill.style.width = pct + '%';
            refs.text.textContent = pct + '%  ·  ' + formatBytes(downloaded) + ' / ' + formatBytes(total);
          } else {
            setIndeterminate(true);
            refs.text.textContent = formatBytes(downloaded);
          }
          refs.meta.textContent = manifest.latest_version ? 'v' + manifest.latest_version : '';
          return;
        }

        if (status === 'installing') {
          refs.title.textContent = '업데이트 설치 중';
          refs.subtitle.textContent = '설치를 마치면 앱이 자동으로 다시 시작됩니다.';
          refs.track.style.display = 'none';
          refs.text.textContent = '';
          showInstall(true);
          refs.installText.textContent = '설치를 완료하고 있습니다.';
          refs.meta.textContent = manifest.latest_version ? 'v' + manifest.latest_version : '';
          return;
        }

        if (status === 'failed') {
          refs.title.textContent = '업데이트 실패';
          refs.subtitle.textContent = '업데이트를 완료하지 못했습니다.';
          refs.track.style.display = 'none';
          refs.text.textContent = '';
          refs.error.textContent = state.error || '알 수 없는 오류가 발생했습니다.';
          showError(true);
          showRetry(true);
          refs.meta.textContent = manifest.latest_version ? 'v' + manifest.latest_version : '';
          return;
        }
      }

      refs.retry.addEventListener('click', function () {
        if (window.starlabUpdate && typeof window.starlabUpdate.invoke === 'function') {
          window.starlabUpdate.invoke('retry');
        }
      });

      // Default to checking state until main process pushes real state
      render({ status: 'checking' });

      if (window.starlabUpdate && typeof window.starlabUpdate.onState === 'function') {
        window.starlabUpdate.onState(render);
      }
    })();
  </script>
</body>
</html>
